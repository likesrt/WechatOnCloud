name: 手动构建双架构镜像

# 手动触发：在 GitHub Actions 页面点 "Run workflow"，输入 tag 后直接构建推送。
# 自动从 git tag 解析版本号（如 v1.0.0），不依赖 CI 触发。
on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本标签（如 v1.0.0）。留空 = latest'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  OWNER: likesrt

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: wechat
            image: wechat-on-cloud
            context: ./docker
            dockerfile: ./docker/Dockerfile
          - name: panel
            image: woc-panel
            context: ./panel
            dockerfile: ./panel/Dockerfile
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU（跨架构模拟）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 解析版本号
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: 构建并推送（双架构）
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
          build-args: ${{ matrix.name == 'panel' && format('WOC_VERSION={0}', steps.ver.outputs.version) || '' }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:${{ steps.ver.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
